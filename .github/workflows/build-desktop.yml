name: Build Desktop Apps (Pake)

on:
  push:
    branches:
      - main
  schedule:
    # Trigger at 10:00 PM (22:00) UTC+3 on the 29th of every month
    # UTC+3 timezone means 10:00 PM local is 7:00 PM UTC (19:00)
    - cron: '0 19 29 * *'
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  build:
    name: Build Desktop Application
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-22.04]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install System Dependencies (Linux only)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev

      - name: Install Pake CLI
        run: npm install -g pake-cli

      - name: Build Application with Pake
        env:
          APP_URL: ${{ vars.PRODUCTION_URL || 'https://life-os-tan.vercel.app/' }}
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            pake "${{ env.APP_URL }}" --name "lifeOS" --icon public/icon-main.ico --hide-title-bar --show-system-tray
            mv [lL]ife[oO][sS]*.exe lifeOS.exe || true
            mv [lL]ife[oO][sS]*.msi lifeOS.msi || true
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            pake "${{ env.APP_URL }}" --name "lifeOS" --icon public/icon-main.png --hide-title-bar --show-system-tray
            mv [lL]ife[oO][sS]*.dmg lifeOS.dmg || true
          else
            pake "${{ env.APP_URL }}" --name "lifeOS" --icon public/icon-main.png --hide-title-bar --show-system-tray
            mv [lL]ife[oO][sS]*.deb lifeOS.deb || true
            mv [lL]ife[oO][sS]*.AppImage lifeOS.AppImage || true
          fi

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-app-${{ matrix.os }}
          path: |
            lifeOS.exe
            lifeOS.msi
            lifeOS.dmg
            lifeOS.deb
            lifeOS.AppImage
          if-no-files-found: ignore
          retention-days: 3

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Determine release parameters
        id: params
        shell: bash
        run: |
          DATE_TAG=$(date +'%Y.%m.%d')
          DATE_READABLE=$(date +'%B %d, %Y')
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "name=Latest Desktop Build" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
            
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "This is the latest automated rolling desktop build of lifeOS, compiled on every push to main." >> $GITHUB_OUTPUT
            echo "For stable monthly releases, see the dated releases below." >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "tag=v${DATE_TAG}" >> $GITHUB_OUTPUT
            echo "name=lifeOS Desktop v${DATE_TAG} (${DATE_READABLE})" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "# 🌟 lifeOS Desktop Release - ${DATE_READABLE}" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "This is an automated monthly release of the lifeOS desktop application compiled using Pake." >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create Release and Upload Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # If it's a rolling release, delete the previous one first to avoid asset conflict/API issues
          if [ "${{ steps.params.outputs.tag }}" = "latest" ]; then
            gh release delete "latest" --yes --cleanup-tag || true
          fi

          gh release create "${{ steps.params.outputs.tag }}" \
            --title "${{ steps.params.outputs.name }}" \
            --notes "${{ steps.params.outputs.body }}" \
            --prerelease="${{ steps.params.outputs.prerelease }}" \
            || gh release edit "${{ steps.params.outputs.tag }}" \
            --title "${{ steps.params.outputs.name }}" \
            --notes "${{ steps.params.outputs.body }}" \
            --prerelease="${{ steps.params.outputs.prerelease }}"
          
          # Delete any existing assets just in case gh release upload fails to overwrite
          assets=$(gh release view "${{ steps.params.outputs.tag }}" --json assets --jq '.assets[].name' 2>/dev/null || true)
          for asset in $assets; do
            gh release delete-asset "${{ steps.params.outputs.tag }}" "$asset" --yes || true
          done
          
          gh release upload "${{ steps.params.outputs.tag }}" release-artifacts/* --clobber
