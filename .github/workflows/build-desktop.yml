name: Build Desktop Apps (Pake)

on:
  release:
    types: [published]
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  build:
    name: Build Desktop Application
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install System Dependencies (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Pake CLI
        run: npm install -g pake-cli

      - name: Build Application with Pake
        env:
          # Uses the PRODUCTION_URL repository variable, with a fallback placeholder
          APP_URL: ${{ vars.PRODUCTION_URL || 'https://lifeos-web.vercel.app' }}
        shell: bash
        run: pake "${{ env.APP_URL }}" --name "lifeOS" --hide-title-bar

      - name: Upload Artifacts to Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: |
            *.exe
            *.msi
            *.dmg
            *.deb
            *.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
