name: Build & Release Desktop (Pake)

# Triggers on version tag push only (e.g. v1.0.3, v2.0.0).
# Each tag push creates/updates a GitHub Release with the built MSI + changelog.
on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 1.2.0) — leave blank to read from package.json'
        required: false
        type: string

jobs:
  build:
    name: Build Windows MSI
    runs-on: windows-latest
    outputs:
      app_version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history needed for changelog generation

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Determine Version
        id: get_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "✅ Building version: ${VERSION}"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web bundle for Pake
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
        run: pnpm run build:pake

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '~/.cargo -> ~/.cargo'

      - name: Install Pake CLI
        run: npm install -g pake-cli

      - name: Patch Pake configuration (updater endpoint + version)
        env:
          TAURI_PUBLIC_KEY: ${{ secrets.TAURI_PUBLIC_KEY }}
          APP_VERSION: ${{ env.VERSION }}
        run: node scripts/patch-pake-config.js

      - name: Build Application with Pake
        shell: bash
        run: |
          pake dist/index.html \
            --name "lifeOS" \
            --icon public/icon-main.ico \
            --hide-title-bar \
            --show-system-tray \
            --hide-on-close \
            --inject scripts/pake-inject.js \
            --iterative-build \
            --use-local-file \
            --app-version "${{ env.VERSION }}"
          # Normalise output file names (Pake may produce various casings)
          mv [lL]ife[oO][sS]*.exe lifeOS.exe || true
          mv [lL]ife[oO][sS]*.msi lifeOS.msi || true

      - name: Generate updater.json and sign MSI zip
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          APP_VERSION: ${{ env.VERSION }}
        run: node scripts/generate-tauri-updater.js

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-app-windows
          path: |
            lifeOS.exe
            lifeOS.msi
            lifeOS.msi.zip
            updater.json
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate Changelog
        id: changelog
        shell: bash
        run: |
          VERSION="v${{ needs.build.outputs.app_version }}"
          DATE_READABLE=$(date +'%B %d, %Y')

          # Find the previous release tag to diff against
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${VERSION}$" | head -1)
          echo "Previous tag: ${PREV_TAG:-none}"

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -30)
          fi

          # Build changelog body
          {
            echo "body<<CHANGELOG_EOF"
            echo "# lifeOS ${VERSION} — ${DATE_READABLE}"
            echo ""
            echo "## What's Changed"
            echo ""
            if [ -n "$COMMITS" ]; then
              echo "$COMMITS"
            else
              echo "- No notable changes"
            fi
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "**Full diff:** [\`${PREV_TAG}..${VERSION}\`](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${VERSION})"
            fi
            echo "CHANGELOG_EOF"
          } >> $GITHUB_OUTPUT

          echo "tag=${VERSION}" >> $GITHUB_OUTPUT
          echo "name=lifeOS ${VERSION} (${DATE_READABLE})" >> $GITHUB_OUTPUT

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.changelog.outputs.tag }}"

          # Delete existing release for this tag if it exists (allows re-running)
          gh release delete "$TAG" --yes 2>/dev/null || true

          gh release create "$TAG" \
            --title "${{ steps.changelog.outputs.name }}" \
            --notes "${{ steps.changelog.outputs.body }}" \
            --latest \
            release-artifacts/*
