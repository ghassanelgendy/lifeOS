name: Build Desktop Apps (Pake)

# Triggers only on tag push (e.g. v1.0.1) or manual workflow dispatch.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 1.0.1)'
        required: false
        type: string

jobs:
  build:
    name: Build Desktop Application
    runs-on: windows-latest
    outputs:
      app_version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Determine Version
        id: get_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web bundle for Pake
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
        run: pnpm run build:pake

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Pake CLI
        run: npm install -g pake-cli

      - name: Patch Pake configuration for updater
        env:
          TAURI_PUBLIC_KEY: ${{ secrets.TAURI_PUBLIC_KEY }}
        run: node scripts/patch-pake-config.js

      - name: Build Application with Pake
        shell: bash
        run: |
          pake dist/index.html --name "lifeOS" --icon public/icon-main.ico --hide-title-bar --show-system-tray --hide-on-close --inject scripts/pake-inject.js --iterative-build --use-local-file --app-version "${{ env.VERSION }}"
          mv [lL]ife[oO][sS]*.exe lifeOS.exe || true
          mv [lL]ife[oO][sS]*.msi lifeOS.msi || true

      - name: Generate updater.json and sign MSI zip
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          APP_VERSION: ${{ env.VERSION }}
        run: node scripts/generate-tauri-updater.js

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-app-windows
          path: |
            lifeOS.exe
            lifeOS.msi
            lifeOS.msi.zip
            updater.json
          if-no-files-found: error
          retention-days: 3

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Determine release parameters
        id: params
        shell: bash
        run: |
          VERSION="${{ needs.build.outputs.app_version }}"
          DATE_READABLE=$(date +'%B %d, %Y')
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "name=lifeOS v${VERSION} (${DATE_READABLE})" >> $GITHUB_OUTPUT
          echo "prerelease=false" >> $GITHUB_OUTPUT
          
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "# 🌟 lifeOS Release v${VERSION} - ${DATE_READABLE}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "This is an automated release of the lifeOS application." >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release and Upload Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${{ steps.params.outputs.tag }}" \
            --title "${{ steps.params.outputs.name }}" \
            --notes "${{ steps.params.outputs.body }}" \
            --prerelease="${{ steps.params.outputs.prerelease }}" \
            || gh release edit "${{ steps.params.outputs.tag }}" \
            --title "${{ steps.params.outputs.name }}" \
            --notes "${{ steps.params.outputs.body }}" \
            --prerelease="${{ steps.params.outputs.prerelease }}"
          
          # Delete any existing assets just in case gh release upload fails to overwrite
          assets=$(gh release view "${{ steps.params.outputs.tag }}" --json assets --jq '.assets[].name' 2>/dev/null || true)
          for asset in $assets; do
            gh release delete-asset "${{ steps.params.outputs.tag }}" "$asset" --yes || true
          done
          
          gh release upload "${{ steps.params.outputs.tag }}" release-artifacts/* --clobber
