name: Build Desktop Apps (Pake)

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  build:
    name: Build Desktop Application
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-22.04]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install System Dependencies (Linux only)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev

      - name: Install Pake CLI
        run: npm install -g pake-cli

      - name: Build Application with Pake
        env:
          # Uses the PRODUCTION_URL repository variable, with the correct Vercel fallback
          APP_URL: ${{ vars.PRODUCTION_URL || 'https://life-os-tan.vercel.app/' }}
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            pake "${{ env.APP_URL }}" --name "lifeOS" --icon public/icon-main.ico --hide-title-bar --show-system-tray
          else
            pake "${{ env.APP_URL }}" --name "lifeOS" --icon public/icon-main.png --hide-title-bar --show-system-tray
          fi

      - name: Upload Artifacts to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name || 'latest' }}
          name: ${{ github.event.release.name || 'Latest Desktop Build' }}
          body: ${{ github.event.release.body || 'This is the latest automated desktop build of lifeOS, compiled on every push to main.' }}
          prerelease: ${{ github.event.release.prerelease || true }}
          files: |
            *.exe
            *.msi
            *.dmg
            *.deb
            *.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts to Actions (Backup)
        uses: actions/upload-artifact@v7
        with:
          name: desktop-app-${{ matrix.os }}
          path: |
            *.exe
            *.msi
            *.dmg
            *.deb
            *.AppImage
          retention-days: 7
