name: OTA Deploy

# Triggers only on tag push (e.g. v1.0.1) or manual workflow dispatch.
# Uploads a new web bundle to Supabase Storage.
# The native iOS app fetches this on startup and hot-reloads without a sideload.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 1.0.1)'
        required: false
        type: string

jobs:
  ota:
    name: Build & Upload OTA Bundle
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm

      - name: Determine Version
        id: get_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web bundle
        run: pnpm build:ios

      - name: Zip the bundle
        run: |
          cd dist
          zip -r ../update.zip .
          cd ..
          echo "Bundle size: $(du -sh update.zip | cut -f1)"

      - name: Generate version.json
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          BUNDLE_NAME="update-${{ env.VERSION }}.zip"
          BUNDLE_URL="${{ secrets.VITE_SUPABASE_URL }}/storage/v1/object/public/app-updates/${BUNDLE_NAME}"
          node -e '
            const fs = require("fs");
            const data = {
              version: process.env.VERSION,
              url: process.argv[1],
              commit: process.env.GITHUB_SHA,
              message: process.env.COMMIT_MESSAGE || ""
            };
            fs.writeFileSync("version.json", JSON.stringify(data));
          ' "$BUNDLE_URL"
          cat version.json

      - name: Upload bundle zip to Supabase Storage
        run: |
          BUNDLE_NAME="update-${{ env.VERSION }}.zip"
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "x-upsert: true" \
            -H "Content-Type: application/zip" \
            --data-binary "@update.zip" \
            "${{ secrets.VITE_SUPABASE_URL }}/storage/v1/object/app-updates/${BUNDLE_NAME}"
          echo "✅ Uploaded ${BUNDLE_NAME}"

      - name: Upload version.json to Supabase Storage
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "x-upsert: true" \
            -H "Content-Type: application/json" \
            --data-binary "@version.json" \
            "${{ secrets.VITE_SUPABASE_URL }}/storage/v1/object/app-updates/version.json"
          echo "✅ version.json updated"

  # Native build ONLY when iOS/Capacitor files change — not on every push
  native-build-check:
    name: Trigger Native Build If Needed
    runs-on: ubuntu-latest
    outputs:
      needs_native: ${{ steps.check.outputs.needs_native }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Check if native rebuild is needed
        id: check
        run: |
          # Use HEAD~1 check if fetch succeeded, else default to false
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          else
            CHANGED=""
          fi
          echo "Changed files:"
          echo "$CHANGED"
          # Trigger native build if any of these change:
          if echo "$CHANGED" | grep -qE "^(ios/|android/|capacitor\.config|package\.json|codemagic\.yaml)"; then
            echo "needs_native=true" >> $GITHUB_OUTPUT
            echo "⚠️  Native rebuild required"
          else
            echo "needs_native=false" >> $GITHUB_OUTPUT
            echo "✅ OTA-only deploy (no native rebuild needed)"
          fi

  notify:
    name: Summary
    runs-on: ubuntu-latest
    needs: [ota, native-build-check]
    steps:
      - name: Print deploy summary
        run: |
          echo "OTA bundle deployed: version ${{ needs.ota.outputs.version }}"
          echo "Native rebuild needed: ${{ needs.native-build-check.outputs.needs_native }}"
          if [ "${{ needs.native-build-check.outputs.needs_native }}" = "true" ]; then
            echo "👉 Run a Codemagic build manually — native files changed."
          else
            echo "👍 Your sideloaded app will auto-update on next launch."
          fi
