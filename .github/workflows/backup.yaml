name: Nightly Supabase Database Backup

on:
  schedule:
    # Runs every night at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows manual trigger of backup

jobs:
  backup:
    name: Backup Supabase Database
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Perform Database Dump
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "Error: SUPABASE_DB_URL secret is not set!"
            exit 1
          fi
          
          # Create backups directory
          mkdir -p backups
          
          # Date format for the filename
          FILENAME="supabase-backup-$(date +%Y-%m-%d_%H-%M-%S).sql"
          
          echo "Starting full database dump (schema + data)..."
          # pg_dump options:
          # --clean: Clean (drop) database objects before recreating
          # --if-exists: Use IF EXISTS when dropping objects
          # --inserts: Dump data as INSERT commands (rather than COPY) for maximum compatibility/readability
          # --create: Include commands to create the database itself (if needed)
          pg_dump --dbname="$SUPABASE_DB_URL" --clean --if-exists --inserts --create > "backups/$FILENAME"
          
          # Compress the backup file
          gzip "backups/$FILENAME"
          echo "Backup compressed: backups/$FILENAME.gz"
          
          # Store filename for subsequent steps
          echo "BACKUP_FILE=backups/$FILENAME.gz" >> $GITHUB_ENV
          echo "BACKUP_NAME=$FILENAME.gz" >> $GITHUB_ENV

      - name: Encrypt Backup File
        env:
          PASSPHRASE: ${{ secrets.BACKUP_ENCRYPTION_PASSPHRASE }}
        run: |
          if [ -z "$PASSPHRASE" ]; then
            echo "Error: BACKUP_ENCRYPTION_PASSPHRASE secret is not set!"
            exit 1
          fi
          
          # Encrypt the compressed backup file using AES-256
          gpg --symmetric --batch --yes --passphrase "$PASSPHRASE" --cipher-algo AES256 "${{ env.BACKUP_FILE }}"
          echo "Backup encrypted: ${{ env.BACKUP_FILE }}.gpg"
          
          # Store encrypted filename for upload
          echo "ENCRYPTED_BACKUP_FILE=${{ env.BACKUP_FILE }}.gpg" >> $GITHUB_ENV

      - name: Upload Encrypted Backup as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: encrypted-database-backups
          path: ${{ env.ENCRYPTED_BACKUP_FILE }}
          retention-days: 7 # Keep backups for 7 days
