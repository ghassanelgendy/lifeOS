name: Nightly Supabase Database Backup

on:
  schedule:
    # Runs every night at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows manual trigger of backup

jobs:
  backup:
    name: Backup Supabase Database
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: 2.98.0

      - name: Perform Database Backup
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "Error: SUPABASE_DB_URL secret is not set!"
            exit 1
          fi
          
          # Create temporary backups directory
          mkdir -p backups_temp
          
          echo "Starting Supabase database backup..."
          
          # 1. Dump roles
          echo "Dumping roles..."
          supabase db dump --db-url "$SUPABASE_DB_URL" -f backups_temp/roles.sql --role-only
          
          # 2. Dump schema
          echo "Dumping schema..."
          supabase db dump --db-url "$SUPABASE_DB_URL" -f backups_temp/schema.sql
          
          # 3. Dump data (using COPY for performance and compatibility)
          echo "Dumping data..."
          supabase db dump --db-url "$SUPABASE_DB_URL" -f backups_temp/data.sql --data-only --use-copy
          
          # Create timestamped tarball name
          TIMESTAMP=$(date +%Y-%m-%d_%H-%M-%S)
          TARBALL_NAME="supabase-backup-$TIMESTAMP.tar.gz"
          
          # Compress the three dump files into a single archive
          tar -czf "$TARBALL_NAME" -C backups_temp roles.sql schema.sql data.sql
          echo "Archive created: $TARBALL_NAME"
          
          # Clean up uncompressed files
          rm -rf backups_temp
          
          # Store filenames in environment for subsequent steps
          echo "BACKUP_TARBALL=$TARBALL_NAME" >> $GITHUB_ENV

      - name: Encrypt Backup Archive
        env:
          PASSPHRASE: ${{ secrets.BACKUP_ENCRYPTION_PASSPHRASE }}
        run: |
          if [ -z "$PASSPHRASE" ]; then
            echo "Error: BACKUP_ENCRYPTION_PASSPHRASE secret is not set!"
            exit 1
          fi
          
          # Encrypt the tarball using AES-256 symmetric encryption
          gpg --symmetric --batch --yes --passphrase "$PASSPHRASE" --cipher-algo AES256 "${{ env.BACKUP_TARBALL }}"
          echo "Backup encrypted: ${{ env.BACKUP_TARBALL }}.gpg"
          
          # Store encrypted filename for upload
          echo "ENCRYPTED_BACKUP_FILE=${{ env.BACKUP_TARBALL }}.gpg" >> $GITHUB_ENV

      - name: Upload Encrypted Backup as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: encrypted-database-backups
          path: ${{ env.ENCRYPTED_BACKUP_FILE }}
          retention-days: 7 # Keep backups for 7 days
