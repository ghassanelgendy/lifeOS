<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        try {
          var raw = localStorage.getItem('lifeos-ui-store');
          var theme = 'dark';
          var accent = 'zinc';
          if (raw) {
            var data = JSON.parse(raw);
            if (data.state) {
              if (data.state.theme === 'light') theme = 'light';
              if (data.state.accentTheme && ['zinc','blue','green','violet','rose','amber'].indexOf(data.state.accentTheme) >= 0) accent = data.state.accentTheme;
            }
          }
          document.documentElement.classList.add(theme);
          document.documentElement.setAttribute('data-accent', accent);
        } catch (e) {
          document.documentElement.classList.add('dark');
          document.documentElement.setAttribute('data-accent', 'zinc');
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="Your personal life operating system" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/web-app-manifest-192x192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/web-app-manifest-192x192.png" />
    <meta name="apple-mobile-web-app-title" content="lifeOS" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>lifeOS</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
