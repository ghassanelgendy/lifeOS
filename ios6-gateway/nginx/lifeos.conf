server {
  listen 80;
  server_name _;

  root /var/www/lifeos;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Supabase reverse proxy under /supabase/*
  #
  # IMPORTANT: use a literal proxy_pass host (not a variable). With
  # `proxy_pass https://$variable` nginx needs `resolver 8.8.8.8;` or you get 502.
  #
  # Change the host below if you use a different Supabase project.
  location /supabase/ {
    rewrite ^/supabase/(.*)$ /$1 break;

    proxy_http_version 1.1;
    proxy_set_header Host wxqmrercyutrrlnhlmus.supabase.co;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    proxy_ssl_server_name on;
    proxy_ssl_name wxqmrercyutrrlnhlmus.supabase.co;

    proxy_connect_timeout 15s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    proxy_pass https://wxqmrercyutrrlnhlmus.supabase.co;
  }
}
